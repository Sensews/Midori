<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Midori | Redefinir senha</title>
  <link rel="icon" type="image/svg+xml" href="Assets/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>
  <div class="header-bg">
    <img src="Assets/Header.svg" alt="" aria-hidden="true">
  </div>

  <div class="logo">
    <img src="Assets/logo.svg" alt="Midori">
  </div>

  <main class="main-content">
    <section class="reset-card">
      <h1>Redefinir Senha</h1>
      <p>Defina sua nova senha para entrar novamente no Midori.</p>
      <p class="rules">Use ao menos 8 caracteres com maiúscula, minúscula, número e símbolo.</p>
      <form id="reset-link-form" novalidate>
        <label for="new-password">Nova senha</label>
        <input id="new-password" type="password" autocomplete="new-password" required>

        <label for="confirm-password">Confirmar nova senha</label>
        <input id="confirm-password" type="password" autocomplete="new-password" required>

        <button id="reset-submit" type="submit">Salvar nova senha</button>
        <div id="reset-message" class="msg"></div>
      </form>
      <a class="back-link" href="index.html">Voltar ao login</a>
    </section>
  </main>

  <div class="footer-bg">
    <img src="Assets/Footer.svg" alt="" aria-hidden="true">
  </div>

  <script src="midori-config.js"></script>
  <script src="api-client.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
