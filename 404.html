<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Midori - Página não encontrada</title>
    <link rel="icon" type="image/svg+xml" href="Assets/icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="404.css">
</head>
<body>
    <!-- Header SVG -->
    <div class="header-bg">
        <img src="Assets/Header.svg" alt="" aria-hidden="true">
    </div>

    <!-- Logo -->
    <div class="logo">
        <img src="Assets/logo.svg" alt="Midori">
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Left Side - Error Message -->
        <div class="error-section">
            <h1 class="error-title">Ooops...</h1>
            <p class="error-subtitle">Página não encontrada</p>
            <a href="index.html" class="btn-home">Pagina inicial</a>
        </div>

        <!-- Right Side - Mascot -->
        <div class="mascot-section">
            <img src="Assets/Mido Curioso.svg" alt="Mido Curioso" class="mascot-img">
        </div>
    </main>

    <!-- Footer SVG -->
    <div class="footer-bg">
        <img src="Assets/Footer.svg" alt="" aria-hidden="true">
    </div>
</body>
</html>
